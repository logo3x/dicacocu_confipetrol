<!-- @startingPoint section="Website" subtitle="Confipetrol marketing site — interactive recreation" viewport="1320x900" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Confipetrol — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  #kit-scroll { height: 100vh; overflow-y: auto; background: var(--surface-card); }
</style>
</head>
<body>
<div id="kit-scroll"><div id="root"></div></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="ServiceDetail.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  function mount() {
    const ready = window.App && window.Nav && window.Footer && window.Home && window.ServiceDetail && window.Contact;
    if (!ready) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<window.App />);
  }
  mount();
</script>
</body>
</html>
