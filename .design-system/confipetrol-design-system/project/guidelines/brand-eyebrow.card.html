<!-- @dsCard group="Brand" viewport="700x180" name="Eyebrow & Accent Rule" subtitle="Orange uppercase eyebrow + 56px underline — the signature heading motif" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:28px 30px; background:var(--surface-card); }
  .eyebrow { font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:.08em; text-transform:uppercase; color:var(--color-accent); margin:0 0 10px; }
  h2 { font-family:var(--font-display); font-weight:800; font-size:34px; letter-spacing:-.02em; color:var(--text-strong); margin:0; }
  .rule { width:56px; height:4px; border-radius:999px; background:var(--color-accent); border:0; margin:16px 0 0; }
</style></head>
<body>
  <p class="eyebrow">Nuestros servicios</p>
  <h2>Confiabilidad y gestión de activos</h2>
  <hr class="rule">
</body></html>
