<!-- @dsCard group="Type" viewport="700x230" name="Display — Montserrat" subtitle="Headlines & hero — weights 700/800, tight tracking" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px 26px; background:var(--surface-card); }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-bottom:14px; letter-spacing:.04em; }
  .d1 { font-family:var(--font-display); font-weight:800; font-size:52px; line-height:1.05; letter-spacing:-.02em; color:var(--text-strong); margin:0; }
  .d2 { font-family:var(--font-display); font-weight:700; font-size:30px; line-height:1.15; color:var(--cp-blue-600); margin:10px 0 0; }
</style></head>
<body>
  <div class="meta">var(--font-display) · Montserrat · 800 / 700</div>
  <h1 class="d1">Una entidad, un propósito, un equipo</h1>
  <p class="d2">Operación y mantenimiento de clase mundial</p>
</body></html>
