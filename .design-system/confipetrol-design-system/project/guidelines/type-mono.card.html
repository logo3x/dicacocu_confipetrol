<!-- @dsCard group="Type" viewport="700x180" name="Data — IBM Plex Mono" subtitle="KPIs, specs, codes — technical figures" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px 26px; background:var(--surface-card); display:flex; gap:40px; align-items:flex-end; }
  .meta { position:absolute; top:18px; left:26px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); letter-spacing:.04em; }
  .kpi { font-family:var(--font-mono); font-weight:600; font-size:40px; color:var(--text-strong); line-height:1; }
  .unit { font-size:18px; color:var(--color-accent); }
  .cap { font-family:var(--font-body); font-size:13px; color:var(--text-muted); margin-top:6px; }
  .code { font-family:var(--font-mono); font-size:13px; color:var(--cp-blue-600); }
</style></head>
<body>
  <div class="meta">var(--font-mono) · IBM Plex Mono · 400 / 600</div>
  <div><div class="kpi">99.2<span class="unit">%</span></div><div class="cap">Disponibilidad de activos</div></div>
  <div><div class="kpi">82.5<span class="unit">t</span></div><div class="cap">CO₂ reducido · ISO 50001</div></div>
  <div><div class="kpi">06</div><div class="cap">Países · <span class="code">CO · PE · CL · BO · EC · VE</span></div></div>
</body></html>
