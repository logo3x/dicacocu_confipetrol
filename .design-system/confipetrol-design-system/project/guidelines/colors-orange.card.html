<!-- @dsCard group="Colors" viewport="700x150" name="Orange Scale" subtitle="--cp-orange-50 → 900 · tints for accents, hovers, soft fills" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--surface-card); font-family:var(--font-mono); }
  .scale { display:flex; gap:6px; }
  .step { flex:1; }
  .box { height:64px; border-radius:var(--radius-sm); border:1px solid rgba(0,0,0,.06); }
  .n { font-size:11px; color:var(--text-strong); margin-top:8px; text-align:center; }
  .h { font-size:9.5px; color:var(--text-muted); text-align:center; }
</style></head>
<body>
  <div class="scale" id="s"></div>
  <script>
    const steps=[['50','#fff5e9'],['100','#fde6c8'],['200','#fbcb8b'],['300','#f8af4f'],['400','#f69a2c'],['500','#f58a1f'],['600','#db7510'],['700','#b45c0c'],['800','#8c470c'],['900','#6b370c']];
    document.getElementById('s').innerHTML = steps.map(([n,h])=>`<div class="step"><div class="box" style="background:${h}"></div><div class="n">${n}</div><div class="h">${h.toUpperCase()}</div></div>`).join('');
  </script>
</body></html>
