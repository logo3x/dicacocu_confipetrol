<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="--radius-xs → pill · lightly rounded, corporate" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px 26px; background:var(--surface-card); display:flex; gap:22px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:78px; height:64px; background:var(--cp-blue-50); border:2px solid var(--cp-blue-600); }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:8px; }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="tok">xs · 3px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="tok">sm · 5px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="tok">md · 8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="tok">lg · 12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="tok">xl · 18px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="tok">pill</div></div>
</body></html>
